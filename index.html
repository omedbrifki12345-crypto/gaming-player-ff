<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin: 0 5px;
            background: #35424a;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover {
            background: #e8491d;
        }
        .hero {
            background: url('hero-image.jpg') no-repeat center center; /* Add an actual hero image here */
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .game {
            background: white;
            margin: 10px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 300px;
        }
        footer {
            background: #35424a;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Gaming Hub</h1>
    </header>
    <nav>
        <a href="#home">Home</a>
        <a href="#games">Games</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <div class="hero">
        <h2>Your Gateway to Fun!</h2>
    </div>
    <section id="games" class="games">
        <div class="game">
            <h3>Game Title 1</h3>
            <p>Description of Game 1.</p>
        </div>
        <div class="game">
            <h3>Game Title 2</h3>
            <p>Description of Game 2.</p>
        </div>
        <div class="game">
            <h3>Game Title 3</h3>
            <p>Description of Game 3.</p>
        </div>
    </section>
    <footer>
        <p>© 2026 Gaming Hub. All rights reserved.</p>
    </footer>
</body>
</html>
